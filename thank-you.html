<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Thank You | NestShield</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <nav class="nav container">
      <a href="/" class="nav-logo">
        <img class="brand-mark" src="nestshield-official-mark.png" alt="" />
        <span class="brand-word"><strong>Nest</strong><span>Shield</span></span>
      </a>
    </nav>
  </header>

  <main>
    <section class="section section-cta">
      <div class="container">
        <div class="cta-wrapper">
          <div class="cta-content">
            <span class="section-tag section-tag-light">Inquiry Received</span>
            <h1 class="cta-title">Thank you for contacting NestShield.</h1>
            <p class="cta-sub">Your inquiry has been submitted. We typically respond within one business day.</p>
            <a href="/" class="btn btn-primary btn-lg">Return to NestShield</a>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
